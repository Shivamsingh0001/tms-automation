# QA Environment Configuration
environment=qa

# API Endpoints
base.url=https://qa-tms.example.com
tms.api.path=/api/v1

# Logging
log.level=DEBUG

# Timeouts (ms)
connection.timeout=30000
read.timeout=60000

# Authentication - UPDATE THESE FOR YOUR TMS ENVIRONMENT
auth.tenant.id=your-qa-tenant-id
auth.client.id=your-qa-client-id
auth.client.secret=your-qa-client-secret
auth.audience=platform:app:tms
auth.app.id=app:your-tms-app-id

# Test Execution
test.retry.enabled=true
test.retry.count=2
health.check.enabled=false

# Performance Thresholds (ms)
api.slow.threshold=2000
