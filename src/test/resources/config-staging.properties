# Staging Environment Configuration
environment=staging

base.url=https://staging-tms.example.com
tms.api.path=/api/v1

log.level=INFO

connection.timeout=30000
read.timeout=60000

auth.tenant.id=your-staging-tenant-id
auth.client.id=your-staging-client-id
auth.client.secret=your-staging-client-secret
auth.audience=platform:app:tms
auth.app.id=app:your-tms-app-id

test.retry.enabled=true
test.retry.count=1
health.check.enabled=true

api.slow.threshold=3000
